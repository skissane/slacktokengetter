name: Build

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Init submodules
        run: git submodule update --init

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build
